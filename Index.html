<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Marketing</title>
    <style>
        /* Variables de diseño por defecto (se sobreescriben con Google Sheets) */
        :root {
            --blue-main: #007BFF;
            --dark-bg: #1a1a1a;
            --white: #ffffff;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: #f0f0f0; /* Fondo por defecto */
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        /* Contenedor Principal Adaptable */
        .container {
            width: 100%;
            max-width: 500px;
            background-color: var(--white);
            border: 8px solid var(--blue-main);
            box-sizing: border-box;
        }

        /* Cabecera */
        .header {
            background-color: var(--blue-main);
            color: white;
            padding: 20px;
            text-align: left;
        }

        .header h1 { 
            margin: 0; 
            font-size: 45px; 
            letter-spacing: -2px; 
            text-transform: uppercase;
        }
        
        .header h2 { 
            margin: 0; 
            font-size: 35px; 
            font-weight: normal; 
            text-transform: uppercase;
        }

        /* Divisores de Sección */
        .divider-dots {
            background-color: var(--dark-bg);
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Contenedor de cada bloque */
        .section-content { 
            padding: 20px; 
            min-height: 20px; 
        }

        /* Diseño de Píldoras (Porcentajes) */
        .item-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            background: #eee;
            border-radius: 30px;
            overflow: hidden;
        }

        .label-pill {
            padding: 15px 25px;
            color: white;
            width: 60%;
            border-radius: 0 30px 30px 0;
            text-transform: uppercase;
            font-size: 13px;
            display: flex;
            align-items: center;
        }

        .value-text {
            width: 40%;
            text-align: center;
            font-size: 14px;
            color: #333;
            font-weight: bold;
        }

        /* Diseño de Cuadros (Textos Largos) */
        .info-box {
            border: 2px solid;
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
        }

        .info-box h4 { 
            margin: 0; 
            text-transform: uppercase; 
        }
        
        .info-box p { 
            margin: 5px 0 0 0; 
            font-size: 12px; 
            font-family: sans-serif; 
            font-weight: bold; 
            line-height: 1.2; 
        }

        /* Ajustes para Celulares (Responsive) */
        @media (max-width: 480px) {
            .header h1 { font-size: 35px; }
            .header h2 { font-size: 25px; }
            
            .label-pill { 
                width: 50%; 
                font-size: 11px; 
                padding: 10px; 
            }
            
            .value-text { 
                width: 50%; 
                font-size: 12px; 
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="main-title">CARGANDO...</h1>
        <h2 id="sub-title">---</h2>
    </div>

    <div class="divider-dots">✦ ✦ ✦ PROGRAMA DE MERCADO ✦ ✦ ✦</div>
    <div class="section-content" id="content-programa">
        </div>

    <div class="divider-dots">⚽ LIGA DE EJECUCIÓN ⚽</div>
    <div class="section-content" id="content-liga">
        </div>
</div>

<script>
    // IMPORTANTE: Reemplaza esto con la URL de tu Apps Script (la que termina en /exec)
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw65sEdKZmLCnR9fYjuawnZnLTWfCkgFHn4hcJsdvCU2Yan_98hO8EHOP3THe-1jWDX/exec';

    async function init() {
        try {
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();

            // 1. Aplicar Configuración General (Títulos)
            document.getElementById('main-title').innerText = data.config.TITULO_PRINCIPAL;
            document.getElementById('sub-title').innerText = data.config.SUBTITULO_FECHA;

            // 2. Aplicar Diseño desde Sheets
            if(data.config.COLOR_BORDE_Y_HEADER) {
                document.documentElement.style.setProperty('--blue-main', data.config.COLOR_BORDE_Y_HEADER);
            }
            if(data.config.COLOR_BARRAS_SEPARADORAS) {
                document.documentElement.style.setProperty('--dark-bg', data.config.COLOR_BARRAS_SEPARADORAS);
            }
            if(data.config.COLOR_FONDO_PAGINA) {
                document.body.style.backgroundColor = data.config.COLOR_FONDO_PAGINA;
            }

            // 3. Limpiar y Renderizar Contenido
            const programaDiv = document.getElementById('content-programa');
            const ligaDiv = document.getElementById('content-liga');
            programaDiv.innerHTML = "";
            ligaDiv.innerHTML = "";

            data.content.forEach(item => {
                let container = (item.seccion === 'PROGRAMA DE MERCADO') ? programaDiv : ligaDiv;
                
                // Si el valor no tiene % o es más largo de 40 caracteres, usamos el "Cuadro"
                if (!item.valor.includes('%') || item.valor.length > 40) {
                    container.innerHTML += `
                        <div class="info-box" style="border-color: ${item.color}">
                            <h4 style="color: ${item.color}">${item.etiqueta}</h4>
                            <p>${item.valor}</p>
                        </div>`;
                } else {
                    // Si es un porcentaje corto, usamos la "Píldora"
                    container.innerHTML += `
                        <div class="item-row">
                            <div class="label-pill" style="background-color: ${item.color}">${item.etiqueta}</div>
                            <div class="value-text">${item.valor}</div>
                        </div>`;
                }
            });
        } catch (err) {
            console.error("Error al cargar los datos de Sheets:", err);
            document.getElementById('main-title').innerText = "ERROR DE CONEXIÓN";
            document.getElementById('sub-title').innerText = "Revisa la consola";
        }
    }

    // Iniciar la carga
    init();
</script>
</body>
</html>
