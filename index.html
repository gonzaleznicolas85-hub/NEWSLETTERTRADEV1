<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Marketing</title>
    <style>
        /* Variables por defecto */
        :root {
            --blue-main: #007BFF;
            --dark-bg: #1a1a1a;
            --white: #ffffff;
        }

        /* Reset básico y fondo */
        body {
            font-family: 'Arial Black', sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 2vw; /* Margen dinámico basado en el ancho de pantalla */
            box-sizing: border-box;
        }

        /* Contenedor principal - AHORA ADAPTADO PARA PC */
        .container {
            width: 100%;
            max-width: 900px; /* Aumentado de 500px a 900px para aprovechar monitores de PC */
            background-color: var(--white);
            border: 8px solid var(--blue-main);
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); /* Sombra para darle profundidad en PC */
        }

        /* Cabecera */
        .header {
            background-color: var(--blue-main);
            color: white;
            padding: 30px 40px; /* Más espacio interior en PC */
            text-align: left;
            word-wrap: break-word;
        }

        .header h1 { 
            margin: 0; 
            /* El texto se adapta: Mínimo 30px en celular, Máximo 60px en PC */
            font-size: clamp(30px, 6vw, 60px); 
            letter-spacing: -1px; 
            text-transform: uppercase;
            line-height: 1.1;
        }
        
        .header h2 { 
            margin: 5px 0 0 0; 
            font-size: clamp(20px, 4vw, 40px); 
            font-weight: normal; 
            text-transform: uppercase;
        }

        /* Divisores (Cintas negras) */
        .divider-dots {
            background-color: var(--dark-bg);
            color: white;
            text-align: center;
            padding: 15px 5px;
            font-size: clamp(14px, 2.5vw, 20px);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Contenedor de cada bloque */
        .section-content { 
            padding: 25px 40px; /* Más padding lateral para que respire en PC */
            min-height: 20px; 
        }

        /* Diseño de Píldoras (Porcentajes) */
        .item-row {
            display: flex;
            align-items: stretch;
            margin-bottom: 15px;
            background: #f4f4f4;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s; /* Pequeño efecto al pasar el mouse en PC */
        }

        .item-row:hover {
            transform: scale(1.01);
        }

        .label-pill {
            padding: 15px 20px;
            color: white;
            width: 45%; /* Reducido para dar más espacio al texto en PC */
            border-radius: 0 40px 40px 0;
            text-transform: uppercase;
            font-size: clamp(12px, 2vw, 16px);
            display: flex;
            align-items: center;
            font-weight: bold;
        }

        .value-text {
            width: 55%;
            text-align: center;
            font-size: clamp(14px, 2.5vw, 18px);
            color: #333;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        /* Diseño de Cuadros (Textos Largos) */
        .info-box {
            border: 3px solid;
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            background-color: #fafafa;
        }

        .info-box h4 { 
            margin: 0; 
            text-transform: uppercase; 
            font-size: clamp(14px, 2.5vw, 20px);
        }
        
        .info-box p { 
            margin: 10px 0 0 0; 
            font-size: clamp(12px, 2vw, 16px);
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold; 
            line-height: 1.5; 
        }

        /* Ajustes específicos para celulares (Responsive) */
        @media (max-width: 600px) {
            body { padding: 0; } /* Quitamos margen exterior en celulares */
            .container { border-width: 4px; border-radius: 0; } /* Borde más fino */
            .header { padding: 20px; }
            .section-content { padding: 15px; }
            .label-pill { width: 50%; padding: 12px 10px; font-size: 11px; }
            .value-text { width: 50%; font-size: 13px; }
        }

        /* Ajustes extremos para pantallas muy angostas */
        @media (max-width: 380px) {
            .item-row { flex-direction: column; border-radius: 10px; }
            .label-pill { width: 100%; border-radius: 10px 10px 0 0; text-align: center; justify-content: center; }
            .value-text { width: 100%; padding: 15px 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="main-title">CARGANDO...</h1>
        <h2 id="sub-title">---</h2>
    </div>

    <div class="divider-dots">✦ ✦ PROGRAMA DE MERCADO ✦ ✦</div>
    <div class="section-content" id="content-programa">
        </div>

    <div class="divider-dots">⚽ LIGA DE EJECUCIÓN ⚽</div>
    <div class="section-content" id="content-liga">
        </div>
</div>

<script>
    // IMPORTANTE: REEMPLAZA ESTO CON TU URL DE APPS SCRIPT
    const WEB_APP_URL = 'TU_URL_DE_APPS_SCRIPT_AQUI';

    async function init() {
        try {
            const res = await fetch(WEB_APP_URL);
            const data = await res.json();

            // 1. Textos Generales
            document.getElementById('main-title').innerText = data.config.TITULO_PRINCIPAL || "RESUMEN";
            document.getElementById('sub-title').innerText = data.config.SUBTITULO_FECHA || "";

            // 2. Colores Dinámicos
            if(data.config.COLOR_BORDE_Y_HEADER) {
                document.documentElement.style.setProperty('--blue-main', data.config.COLOR_BORDE_Y_HEADER);
            }
            if(data.config.COLOR_BARRAS_SEPARADORAS) {
                document.documentElement.style.setProperty('--dark-bg', data.config.COLOR_BARRAS_SEPARADORAS);
            }
            if(data.config.COLOR_FONDO_PAGINA) {
                document.body.style.backgroundColor = data.config.COLOR_FONDO_PAGINA;
            }

            // 3. Renderizar Contenido
            const programaDiv = document.getElementById('content-programa');
            const ligaDiv = document.getElementById('content-liga');
            programaDiv.innerHTML = "";
            ligaDiv.innerHTML = "";

            data.content.forEach(item => {
                let container = (item.seccion === 'PROGRAMA DE MERCADO') ? programaDiv : ligaDiv;
                
                if (!item.valor.includes('%') || item.valor.length > 40) {
                    container.innerHTML += `
                        <div class="info-box" style="border-color: ${item.color}">
                            <h4 style="color: ${item.color}">${item.etiqueta}</h4>
                            <p>${item.valor}</p>
                        </div>`;
                } else {
                    container.innerHTML += `
                        <div class="item-row">
                            <div class="label-pill" style="background-color: ${item.color}">${item.etiqueta}</div>
                            <div class="value-text">${item.valor}</div>
                        </div>`;
                }
            });
        } catch (err) {
            console.error("Error cargando datos:", err);
            document.getElementById('main-title').innerText = "ERROR";
            document.getElementById('sub-title').innerText = "Verifica la conexión";
        }
    }

    init();
</script>
</body>
</html>
